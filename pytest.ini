[pytest]
minversion = 8.0
testpaths = tests
pythonpath = .
addopts = -ra --tb=short --strict-markers --strict-config
xfail_strict = true
norecursedirs = .git .venv venv build dist .mypy_cache .pytest_cache __pycache__

filterwarnings =
    ignore::DeprecationWarning:importlib._bootstrap

markers =
    slow: long-running tests
    gpu: requires CUDA device
    integration: cross-module/integration tests